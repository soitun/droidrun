[project]
name = "droidrun"
version = "v0.6.0rc1"
description = "Compatibility shim — droidrun has been renamed to mobilerun"
requires-python = ">=3.11,<3.14"
dependencies = ["mobilerun==v0.6.0rc1"]

[project.optional-dependencies]
anthropic = ["mobilerun[anthropic]==v0.6.0rc1"]
deepseek = ["mobilerun[deepseek]==v0.6.0rc1"]
langfuse = ["mobilerun[langfuse]==v0.6.0rc1"]
dev = ["mobilerun[dev]==v0.6.0rc1"]

[project.scripts]
droidrun = "droidrun.cli_shim:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["droidrun"]
